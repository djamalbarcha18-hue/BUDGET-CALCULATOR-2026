<!DOCTYPE html>
<!--
  ============================================================================
   SmartBudget Pro 2026 · شريط تهيئة المستخدم الجديد · OnboardingSidebar.html
   شريط جانبي عربي (RTL) بوضع داكن، يوجّه المستخدم بخطوات تفاعليّة، ويفرض
   الأرقام اللاتينيّة. يتواصل مع الخادم عبر google.script.run فقط.
  ============================================================================
-->
<html lang="ar" dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-page:#0F172A; --bg-card:#1F2937; --fg:#F1F5F9; --muted:#94A3B8;
      --accent:#06B6D4; --good:#10B981; --grid:#334155;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg-page); color:var(--fg); direction:rtl;
      font-family:'Tajawal','Segoe UI',Tahoma,Arial,sans-serif; padding:14px; }
    header h1 { font-size:16px; margin:0 0 2px; }
    header p { font-size:12px; color:var(--muted); margin:0 0 12px; }
    .step { background:var(--bg-card); border:1px solid var(--grid);
      border-radius:12px; padding:12px; margin-bottom:10px; }
    .step .top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .step .icon { font-size:20px; }
    .step h2 { font-size:14px; margin:0; font-weight:700; }
    .step p { font-size:12px; color:var(--muted); margin:0 0 10px; }
    .num { margin-inline-start:auto; font-size:12px; color:var(--accent); font-weight:700; }
    button { width:100%; background:var(--bg-page); color:var(--fg);
      border:1px solid var(--accent); border-radius:8px; padding:8px;
      font-size:13px; font-family:inherit; cursor:pointer; }
    button:hover { background:#25324a; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .finish { background:var(--good); border-color:var(--good); color:#04241a;
      font-weight:700; margin-top:6px; }
    .status { font-size:12px; color:var(--muted); text-align:center;
      border-top:1px solid var(--grid); padding-top:10px; margin-top:8px; }
    .footer { font-size:11px; color:var(--muted); text-align:center; margin-top:10px; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">مرحباً بك</h1>
    <p id="subtitle"></p>
  </header>
  <div id="steps"></div>
  <button class="finish" id="finishBtn" onclick="finish()">إنهاء التهيئة</button>
  <div class="status" id="status">جارٍ التحميل…</div>
  <div class="footer" id="footer"></div>

  <script>
    /** فرض الأرقام اللاتينيّة (1, 2, 3). */
    function toLatinDigits(v) {
      return String(v)
        .replace(/[\u0660-\u0669]/g, function (d){ return d.charCodeAt(0)-0x0660; })
        .replace(/[\u06F0-\u06F9]/g, function (d){ return d.charCodeAt(0)-0x06F0; });
    }
    var $ = function (id){ return document.getElementById(id); };
    function setStatus(t){ $('status').textContent = toLatinDigits(t); }

    /** بناء بطاقات الخطوات من بيانات الخادم. */
    function render(data) {
      $('title').textContent = data.title;
      $('subtitle').textContent = data.subtitle;
      $('footer').textContent = toLatinDigits(data.version || '');
      var wrap = $('steps'); wrap.innerHTML = '';
      data.steps.forEach(function (step, i) {
        var card = document.createElement('div'); card.className = 'step';
        var top = document.createElement('div'); top.className = 'top';
        top.innerHTML = '<span class="icon">' + step.icon + '</span>' +
                        '<h2>' + step.title + '</h2>' +
                        '<span class="num">' + toLatinDigits(i + 1) + '</span>';
        var p = document.createElement('p'); p.textContent = step.body;
        var btn = document.createElement('button'); btn.textContent = step.btn;
        btn.onclick = function () { doStep(step, btn); };
        card.appendChild(top); card.appendChild(p); card.appendChild(btn);
        wrap.appendChild(card);
      });
      setStatus('اختر خطوة للبدء.');
    }

    /** تنفيذ خطوة (فتح ورقة أو تشغيل أمر) عبر الخادم. */
    function doStep(step, btn) {
      btn.disabled = true; setStatus('جارٍ التنفيذ…');
      google.script.run
        .withSuccessHandler(function (res) {
          btn.disabled = false;
          setStatus(res && res.message ? res.message : 'تمّ.');
        })
        .withFailureHandler(function (err) {
          btn.disabled = false; setStatus('خطأ: ' + (err && err.message ? err.message : err));
        })
        .onboardingDoStep(step);
    }

    /** إنهاء التهيئة وتسجيلها كمكتملة. */
    function finish() {
      $('finishBtn').disabled = true; setStatus('جارٍ الإنهاء…');
      google.script.run
        .withSuccessHandler(function (res) { setStatus(res && res.message ? res.message : 'تمّ.'); })
        .withFailureHandler(function (err) {
          $('finishBtn').disabled = false; setStatus('خطأ: ' + (err && err.message ? err.message : err));
        })
        .onboardingComplete();
    }

    /** تحميل الخطوات عند فتح الشريط. */
    (function init() {
      google.script.run
        .withSuccessHandler(render)
        .withFailureHandler(function () { setStatus('تعذّر تحميل الخطوات.'); })
        .onboardingGetSteps();
    })();
  </script>
</body>
</html>
